services:
  api:
    build:
      context: .
    container_name: habitum-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__HabitumContext: ${ConnectionStrings__HabitumContext}
      JwtSettings__SecretKey: ${JwtSettings__SecretKey}
      JwtSettings__Issuer: ${JwtSettings__Issuer}
      JwtSettings__Audience: ${JwtSettings__Audience}
    networks:
      - db-network
      - npm-network
    expose:
      - "8080" # Apenas exposta internamente
    depends_on:
      migrator:
        condition: service_completed_successfully

  db:
    image: mysql:8.0
    container_name: habitum-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: habitum
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 20
    networks:
      - db-network

  migrator:
    build:
      context: .
      target: build
    container_name: habitum-migrator
    environment:
      ConnectionStrings__HabitumContext: ${ConnectionStrings__HabitumContext}
    command: ["dotnet", "ef", "database", "update"]
    networks:
      - db-network
    depends_on:
      db:
        condition: service_healthy
    
networks:
  npm-network:
    external: true
    name: npm-data_default
  db-network:
    driver: bridge

volumes:
  mysql_data:
